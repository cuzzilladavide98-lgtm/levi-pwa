<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
  <title>LEVI</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#000000">
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --accent: #0055aa;
      --border: #e0e0e0;
      --muted: #777777;
    }
    [data-theme="dark"] {
      --bg: #131313;
      --fg: #f5f5f5;
      --accent: #4488ff;
      --border: #2a2a2a;
      --muted: #aaaaaa;
    }
    body {
      margin: 0;
      padding: calc(env(safe-area-inset-top,0px) + 16px) 16px calc(env(safe-area-inset-bottom,0px) + 40px);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .btn {
      display: inline-block;
      border: none;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 1rem;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      text-align: center;
      transition: transform 0.15s ease;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Bottone microfono grande e circolare */
    .mic-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      font-size: 2rem;
      background: var(--accent);
      color: #fff;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border: none;
      transition: transform 0.2s ease;
    }
    .mic-btn.recording {
      animation: pulse 1.6s infinite;
    }

    /* Stato registrazione: leggera animazione pulsante */
    .btn.recording {
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .section {
      margin-top: 24px;
    }
    .quest-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .quest-item {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      /* transizioni per animazioni leggere */
      transition: background 0.2s ease, opacity 0.2s ease;
    }
    .quest-item span {
      flex: 1;
      padding-right: 10px;
    }
    .quest-item button {
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      margin-left: 4px;
    }

    /* Pulsanti speciali per star e delete nelle quest */
    .quest-item .star-btn {
      background: none;
      color: var(--accent);
      font-size: 1.2rem;
      border: none;
      cursor: pointer;
      margin-right: 6px;
    }
    .quest-item .star-btn.priority {
      color: #f1c40f;
    }
    .quest-item .delete-btn {
      background: none;
      color: var(--muted);
      font-size: 1.2rem;
      border: none;
      cursor: pointer;
      margin-left: 6px;
    }
    #transcript, #suggestions {
      margin-top: 16px;
      font-size: 0.95rem;
      transition: opacity 0.5s ease;
    }

    /* classe per dissolvenza */
    #transcript.fade-out, #suggestions.fade-out {
      opacity: 0;
    }
    .crocette {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .crocette button {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
      background: var(--bg);
      color: var(--fg);
      /* transizione fluida per stato attivo/inattivo */
      transition: background 0.15s ease, color 0.15s ease;
    }
    .crocette button.active {
      background: var(--accent);
      color: #fff;
    }
    .footer-actions {
      margin-top: 32px;
      display: flex;
      gap: 10px;
    }
    .footer-actions button,
    .footer-actions label {
      flex: 1;
      display: block;
      font-size: 0.85rem;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
      text-align: center;
      cursor: pointer;
    }
    .footer-actions input[type="file"] {
      display: none;
    }

    /* Testo introduttivo più leggero */
    .intro {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <h1>LEVI</h1>
  <p class="intro">Parla o scrivi per trasformare pensieri in azioni.</p>

  <!-- Contenitore microfono: un grande pulsante circolare al centro -->
  <div style="text-align:center; margin-top:16px;">
    <button id="recordBtn" class="mic-btn">🎤</button>
  </div>
  <!-- Campo testo opzionale -->
  <textarea id="textInput" placeholder="Digita qui se preferisci" rows="2" style="width:100%; margin-top:20px; font-size:1rem; padding:8px; border-radius:4px; border:1px solid var(--border);"></textarea>
  <button id="submitText" class="btn" style="width:100%; margin-top:8px;">Aggiungi</button>

  <!-- Mostra testo riconosciuto -->
  <div id="transcript" style="margin-top:12px; font-weight:bold;"></div>
  <div id="suggestions"></div>

  <!-- Contenitore per la scelta di classificazione -->
  <div id="classifyContainer" style="display:none; margin-top:16px;">
    <p id="classifyText" style="margin-bottom:8px; font-size:1rem;"></p>
    <div style="display:flex; gap:8px;">
      <button id="classQuest" class="btn" style="flex:1;">Quest</button>
      <button id="classNote" class="btn" style="flex:1;">Nota</button>
      <button id="classDiscard" class="btn" style="flex:1;">Scarta</button>
    </div>
  </div>

  <div class="section" id="questsSection">
    <h2>Quest attive</h2>
    <ul class="quest-list" id="questList"></ul>
    <p id="noQuests" style="color:var(--muted);">Nessuna quest attiva</p>
  </div>

  <div class="section">
    <h2>Oggi</h2>
    <div class="crocette" id="crocette"></div>
  </div>

  <div class="section">
    <h2>Storico</h2>
    <div id="history"></div>
  </div>

  <div class="footer-actions">
    <button id="exportBtn">Esporta dati</button>
    <label for="importInput">Importa dati</label>
    <input type="file" id="importInput" accept="application/json">
    <button id="notifBtn">Notifiche</button>
  </div>

  <script>
  (() => {
    const STATE_KEY = 'levi-state';
    let state = null;
    const MAX_QUESTS = 3;

    function load() {
      try {
        const raw = localStorage.getItem(STATE_KEY);
        state = raw ? JSON.parse(raw) : null;
      } catch (e) {
        state = null;
      }
      if (!state) {
        state = {
          quests: [],
          history: {},
          crocette: { corpo: false, mossa: false, lucidita: false },
          notificationsEnabled: false
        };
      } else {
        // assicura che il campo notificationsEnabled esista
        if (state.notificationsEnabled === undefined) state.notificationsEnabled = false;
        if (!state.crocette) state.crocette = { corpo: false, mossa: false, lucidita: false };
        // assicura che ogni quest abbia il campo priority
        if (state.quests && Array.isArray(state.quests)) {
          state.quests.forEach(q => {
            if (q.priority === undefined) q.priority = false;
          });
        }
      }
      render();
    }
    function save() {
      try {
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
      } catch (e) {
        console.warn('Errore salvataggio', e);
      }
    }
    // Utility per ottenere data ISO (giorno)
    function today() {
      const d = new Date();
      d.setHours(0,0,0,0);
      return d.toISOString().split('T')[0];
    }
    // Gestione crocette
    function toggleCrocetta(key) {
      state.crocette[key] = !state.crocette[key];
      save();
      renderCrocette();
    }
    function renderCrocette() {
      const cElem = document.getElementById('crocette');
      cElem.innerHTML = '';
      const items = [
        { key:'corpo', label:'Corpo' },
        { key:'mossa', label:'Mossa' },
        { key:'lucidita', label:'Lucidità' }
      ];
      items.forEach(item => {
        const btn = document.createElement('button');
        btn.textContent = item.label;
        if (state.crocette[item.key]) btn.classList.add('active');
        btn.addEventListener('click', () => toggleCrocetta(item.key));
        cElem.appendChild(btn);
      });
    }
    // Gestione quest
    function addQuest(text) {
      if (state.quests.length >= MAX_QUESTS) {
        alert('Hai già 3 quest attive. Completa o archivia prima di aggiungerne altre.');
        return;
      }
      const id = Date.now();
      state.quests.push({ id, text, created: today(), priority: false });
      save();
      renderQuests();
      // vibrazione leggera
      if (navigator.vibrate) navigator.vibrate(50);
      // notifica locale
      if (state.notificationsEnabled && 'Notification' in window && Notification.permission === 'granted') {
        new Notification('Nuova quest', { body: text });
      }
    }
    function completeQuest(id) {
      state.quests = state.quests.filter(q => q.id !== id);
      save();
      renderQuests();
      if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
      // notifica locale su completamento
      if (state.notificationsEnabled && 'Notification' in window && Notification.permission === 'granted') {
        new Notification('Quest completata', { body: 'Ben fatto!' });
      }
    }

    // Elimina quest
    function deleteQuest(id) {
      state.quests = state.quests.filter(q => q.id !== id);
      save();
      renderQuests();
    }

    // Toggle priorità
    function togglePriority(id) {
      const q = state.quests.find(q => q.id === id);
      if (q) {
        q.priority = !q.priority;
        save();
        renderQuests();
      }
    }
    function renderQuests() {
      const list = document.getElementById('questList');
      list.innerHTML = '';
      if (!state.quests.length) {
        document.getElementById('noQuests').style.display = 'block';
      } else {
        document.getElementById('noQuests').style.display = 'none';
      }
      // Ordina con priorità prima
      const quests = state.quests.slice().sort((a,b) => {
        if (a.priority === b.priority) return 0;
        return a.priority ? -1 : 1;
      });
      quests.forEach(q => {
        const li = document.createElement('li');
        li.className = 'quest-item';
        const leftWrapper = document.createElement('div');
        leftWrapper.style.display = 'flex';
        leftWrapper.style.alignItems = 'center';
        // Star per priorità
        const starBtn = document.createElement('button');
        starBtn.className = 'star-btn' + (q.priority ? ' priority' : '');
        starBtn.innerHTML = q.priority ? '★' : '☆';
        starBtn.addEventListener('click', () => togglePriority(q.id));
        leftWrapper.appendChild(starBtn);
        const span = document.createElement('span');
        span.textContent = q.text;
        leftWrapper.appendChild(span);
        li.appendChild(leftWrapper);
        // Pulsante condividi se supportato
        if (navigator.share) {
          const shareBtn = document.createElement('button');
          shareBtn.textContent = 'Condividi';
          shareBtn.addEventListener('click', () => {
            navigator.share({
              title: 'Quest LEVI',
              text: q.text
            }).catch(() => {
              // se l’utente annulla, non fare nulla
            });
          });
          li.appendChild(shareBtn);
        }
        // Pulsante completa
        const completeBtn = document.createElement('button');
        completeBtn.textContent = 'Completa';
        completeBtn.addEventListener('click', () => completeQuest(q.id));
        li.appendChild(completeBtn);
        // Pulsante elimina
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', () => deleteQuest(q.id));
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }
    // Gestione storico
    function addToHistory(entry) {
      const d = today();
      if (!state.history[d]) state.history[d] = [];
      state.history[d].push(entry);
    }
    function renderHistory() {
      const hElem = document.getElementById('history');
      hElem.innerHTML = '';
      const days = Object.keys(state.history).sort().reverse();
      if (!days.length) {
        hElem.textContent = 'Nessun storico.';
        return;
      }
      days.forEach(day => {
        const dayDiv = document.createElement('div');
        const header = document.createElement('h3');
        const date = new Date(day + 'T00:00');
        header.textContent = date.toLocaleDateString('it-IT',{ weekday:'short', day:'numeric', month:'short' });
        dayDiv.appendChild(header);
        const ul = document.createElement('ul');
        ul.style.listStyle = 'disc';
        ul.style.paddingLeft = '18px';
        state.history[day].forEach(ent => {
          const li = document.createElement('li');
          li.textContent = ent;
          ul.appendChild(li);
        });
        dayDiv.appendChild(ul);
        hElem.appendChild(dayDiv);
      });
    }
    // Parsing input: classificazione senza "devo"
    // Variabile per memorizzare il testo in attesa di classificazione
    let pendingText = '';
    // Mostra il pannello di classificazione per un testo
    function showClassification(text) {
      const clean = text.trim();
      if (!clean) return;
      pendingText = clean;
      const classifyContainer = document.getElementById('classifyContainer');
      const classifyText = document.getElementById('classifyText');
      classifyText.textContent = clean;
      classifyContainer.style.display = 'block';
      // mostra anche il transcript con freccia
      document.getElementById('transcript').textContent = '→ ' + clean;
      // reset messaggi
      const suggestionsEl = document.getElementById('suggestions');
      suggestionsEl.textContent = '';
      // rimuovi eventuale dissolvenza
      document.getElementById('transcript').classList.remove('fade-out');
      suggestionsEl.classList.remove('fade-out');
      clearTimeout(fadeTimer);
    }
    // Commit della classificazione in base alla scelta dell’utente
    function commitClassification(type) {
      const classifyContainer = document.getElementById('classifyContainer');
      classifyContainer.style.display = 'none';
      const suggestionsEl = document.getElementById('suggestions');
      // se non c’è pendingText, esci
      if (!pendingText) return;
      if (type === 'quest') {
        // aggiungi sempre a storico e come quest
        addToHistory(pendingText);
        addQuest(pendingText);
        suggestionsEl.textContent = '• Quest aggiunta';
      } else if (type === 'note') {
        // aggiungi solo nello storico
        addToHistory(pendingText);
        suggestionsEl.textContent = '• Nota salvata';
      } else if (type === 'discard') {
        // ignora tutto
        suggestionsEl.textContent = '• Scartato';
      }
      // reset pending
      pendingText = '';
      save();
      renderHistory();
      // cancella valore textarea
      document.getElementById('textInput').value = '';
      // avvia dissolvenza dei messaggi
      const transcriptEl = document.getElementById('transcript');
      clearTimeout(fadeTimer);
      fadeTimer = setTimeout(() => {
        transcriptEl.classList.add('fade-out');
        suggestionsEl.classList.add('fade-out');
      }, 4000);
    }
    // Riconoscimento vocale
    let recognition = null;
    // Timer per dissolvenza di transcript e suggestions
    let fadeTimer = null;
    function initSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        return null;
      }
      const recog = new SpeechRecognition();
      recog.lang = 'it-IT';
      recog.interimResults = false;
      recog.maxAlternatives = 1;
      // avvia animazione al pulsante in fase di registrazione
      recog.onstart = () => {
        const btn = document.getElementById('recordBtn');
        if (btn) btn.classList.add('recording');
      };
      recog.onresult = e => {
        const text = e.results[0][0].transcript;
        // Mostra l’input riconosciuto e chiedi classificazione
        showClassification(text);
      };
      recog.onerror = e => {
        document.getElementById('transcript').textContent = 'Errore riconoscimento: ' + e.error;
      };
      recog.onend = () => {
        const btn = document.getElementById('recordBtn');
        if (btn) btn.classList.remove('recording');
      };
      return recog;
    }
    // Gestione export
    function exportData() {
      const blob = new Blob([JSON.stringify(state)], { type: 'application/json' });
      const timestamp = new Date().toISOString().split('T')[0];
      const fileName = `levi-backup-${timestamp}.json`;
      // se la Web Share API con file è supportata, usa share
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], fileName, { type: 'application/json' })] })) {
        const file = new File([blob], fileName, { type: 'application/json' });
        navigator.share({
          files: [file],
          title: 'Backup LEVI',
          text: 'Ecco il mio backup LEVI'
        }).catch(() => {
          // se l’utente annulla, non fare nulla
        });
        return;
      }
      // fallback: download del file
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
    // Gestione import
    function importData(file) {
      const reader = new FileReader();
      reader.onload = evt => {
        try {
          const data = JSON.parse(evt.target.result);
          if (data && typeof data === 'object') {
            state = data;
            save();
            load();
          }
        } catch (e) {
          alert('File non valido');
        }
      };
      reader.readAsText(file);
    }
    // Render
    function render() {
      renderCrocette();
      renderQuests();
      renderHistory();
    }
    // Event listeners
    document.addEventListener('DOMContentLoaded', () => {
      load();
      recognition = initSpeech();
      const recordBtn = document.getElementById('recordBtn');
      recordBtn.addEventListener('click', () => {
        if (!recognition) {
          alert('Riconoscimento vocale non supportato');
          return;
        }
        document.getElementById('transcript').textContent = 'Ascolto...';
        recognition.start();
      });
      document.getElementById('submitText').addEventListener('click', () => {
        const val = document.getElementById('textInput').value;
        showClassification(val);
      });
      document.getElementById('exportBtn').addEventListener('click', exportData);
      document.getElementById('importInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (file) importData(file);
      });
      // Gestione notifiche
      const notifBtn = document.getElementById('notifBtn');
      notifBtn.addEventListener('click', () => {
        // Richiesta permesso notifiche
        if (!('Notification' in window)) {
          alert('Le notifiche non sono supportate dal browser.');
          return;
        }
        if (Notification.permission === 'denied') {
          alert('Hai negato le notifiche. Abilita dalle impostazioni del browser.');
          return;
        }
        if (Notification.permission === 'granted') {
          // Attiva/disattiva
          state.notificationsEnabled = !state.notificationsEnabled;
          save();
          notifBtn.textContent = state.notificationsEnabled ? 'Notifiche ✓' : 'Notifiche';
          return;
        }
        // chiede permesso
        Notification.requestPermission().then(permission => {
          if (permission === 'granted') {
            state.notificationsEnabled = true;
            save();
            notifBtn.textContent = 'Notifiche ✓';
            // notifica test
            new Notification('Notifiche abilitate', { body: 'Ora riceverai avvisi per le tue quest.' });
          }
        });
      });
      // Imposta stato pulsante notifiche al load
      const initialNotifBtn = document.getElementById('notifBtn');
      if (state.notificationsEnabled) initialNotifBtn.textContent = 'Notifiche ✓';

      // Eventi per classificazione
      document.getElementById('classQuest').addEventListener('click', () => commitClassification('quest'));
      document.getElementById('classNote').addEventListener('click', () => commitClassification('note'));
      document.getElementById('classDiscard').addEventListener('click', () => commitClassification('discard'));

      // Richiede persistenza dello storage per evitare che il browser cancelli i dati
      if (navigator.storage && navigator.storage.persist) {
        navigator.storage.persist().then(granted => {
          // possiamo eventualmente mostrare un messaggio per diagnosi
          console.log('Persistenza storage', granted ? 'concessa' : 'negata');
        });
      }
    });
  })();
  </script>
</body>
</html>
